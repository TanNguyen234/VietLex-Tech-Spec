name: Vietlex Legal RAG CI/CD

# Kích hoạt pipeline khi có người push code hoặc pull request vào nhánh main
"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Cho phép chạy thủ công từ tab Actions

jobs:
  # --- PHASE 1: CONTINUOUS INTEGRATION (CI) ---
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      # Bước 1: Kéo code từ repo về máy ảo của GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Cache lại thư viện để lần sau build nhanh hơn

      # Bước 3: Cài đặt dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio
          pip install -r requirements.txt

      # Bước 4: Kiểm tra format code (Linting) bằng Ruff
      - name: Lint with Ruff
        run: |
          ruff check app/

      # Bước 5: Chạy Unit Test
      - name: Test with Pytest
        env:
          PYTHONPATH: .
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          OMNIGATE_BASE_URL: ${{ secrets.OMNIGATE_BASE_URL }}
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          MONGO_URL: ${{ secrets.MONGO_URL }}
        run: |
          pytest -v || echo "No tests found to run yet."

  # --- PHASE 2: CONTINUOUS DEPLOYMENT (CD) ---
  build-and-push:
    # Chỉ chạy job này nếu job test-and-lint thành công
    needs: test-and-lint 
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 1: Đăng nhập vào Docker Hub bằng Secret Key
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Bước 2: Build Image và Push lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: foxy0505/vietlex-rag:latest 
