<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VietLex - Bảng Điều khiển Đánh giá & Giám sát RAG</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
        }
        
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .glass-card {
            background: rgba(30, 41, 59, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(245, 158, 11, 0.15);
            border-radius: 999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(245, 158, 11, 0.3);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-[100dvh] flex flex-col justify-between overflow-x-hidden selection:bg-amber-500/20 selection:text-amber-300">
    
    <!-- Top Decorative Glow -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-[300px] bg-gradient-to-b from-amber-500/5 via-transparent to-transparent blur-3xl pointer-events-none z-0"></div>

    <!-- Header -->
    <header class="relative border-b border-slate-900 bg-slate-950/80 sticky top-0 z-40 backdrop-blur-md">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <a href="/" 
                   class="w-8 h-8 rounded-lg border border-slate-800 bg-slate-900/50 hover:bg-slate-900 hover:border-amber-500/30 text-slate-400 hover:text-amber-400 flex items-center justify-center transition-all duration-200 active:scale-95"
                   title="Quay lại giao diện Chat">
                    <i class="ph ph-arrow-left text-base"></i>
                </a>
                <div>
                    <h1 class="text-base font-bold tracking-tight bg-gradient-to-r from-amber-200 via-amber-400 to-yellow-200 bg-clip-text text-transparent">BẢNG QUẢN TRỊ VIETLEX</h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-mono font-medium">RAG Evaluation & Logs Monitor</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-3">
                <button hx-get="/admin/stats"
                        hx-target="#stats-container"
                        hx-swap="innerHTML"
                        class="inline-flex items-center space-x-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border border-slate-850 bg-slate-900/30 hover:bg-slate-900 text-slate-400 hover:text-amber-400 transition-all duration-200 active:scale-95">
                    <i class="ph ph-arrows-clockwise text-sm"></i>
                    <span>Làm mới Stats</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="relative z-10 flex-1 max-w-6xl w-full mx-auto px-4 py-8 flex flex-col space-y-8 overflow-hidden">
        
        <!-- Section 1: Stats Dashboard Grid -->
        <div id="stats-container" 
             hx-get="/admin/stats" 
             hx-trigger="load" 
             hx-swap="innerHTML"
             class="grid grid-cols-2 md:grid-cols-5 gap-4">
            <!-- Loading skeleton inside cards -->
            <div class="glass-panel p-5 rounded-2xl animate-pulse col-span-2 md:col-span-1 h-28"></div>
            <div class="glass-panel p-5 rounded-2xl animate-pulse h-28"></div>
            <div class="glass-panel p-5 rounded-2xl animate-pulse h-28"></div>
            <div class="glass-panel p-5 rounded-2xl animate-pulse h-28"></div>
            <div class="glass-panel p-5 rounded-2xl animate-pulse h-28"></div>
        </div>

        <!-- Section 2: Logs Table & Search -->
        <div class="glass-panel rounded-2xl p-6 flex flex-col space-y-4 shadow-xl">
            <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                <div>
                    <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400 font-mono">Nhật ký Tương tác & Đánh giá</h2>
                    <p class="text-xs text-slate-500 mt-0.5">Hiển thị lịch sử hội thoại thời gian thực kèm các chỉ số Faithfulness và Answer Relevance.</p>
                </div>
                
                <!-- Search bar dynamic HTMX -->
                <div class="relative w-full sm:w-80">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm">
                        <i class="ph ph-magnifying-glass"></i>
                    </span>
                    <input type="text"
                           name="search"
                           placeholder="Tìm kiếm query, response, trace id..."
                           hx-get="/admin/logs"
                           hx-trigger="keyup changed delay:350ms, search"
                           hx-target="#logs-table-container"
                           hx-swap="innerHTML"
                           class="w-full bg-slate-950/60 border border-slate-800 rounded-xl pl-9 pr-4 py-2.5 text-xs focus:outline-none focus:border-amber-500/40 transitionplaceholder-slate-600 text-slate-200">
                </div>
            </div>

            <!-- Table Container (HTMX loaded) -->
            <div id="logs-table-container" 
                 hx-get="/admin/logs" 
                 hx-trigger="load" 
                 hx-swap="innerHTML">
                <!-- Loading placeholder table -->
                <div class="py-12 flex flex-col items-center justify-center text-slate-500 text-xs space-y-2">
                    <i class="ph ph-circle-notch animate-spin text-lg text-amber-500"></i>
                    <span>Đang tải nhật ký tương tác...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal details overlay (target for HTMX details response) -->
    <div id="detail-modal-container"></div>

    <!-- Footer -->
    <footer class="relative z-10 border-t border-slate-900/50 bg-slate-950/20 py-4">
        <div class="max-w-6xl mx-auto px-4 flex flex-col sm:flex-row items-center justify-between text-[11px] text-slate-650 font-mono">
            <div>&copy; 2026 VietLex RAG Admin.</div>
            <div class="mt-1 sm:mt-0">Độ cản gió giao diện: 6 / 5 / 5 (Variance/Motion/Density).</div>
        </div>
    </footer>
</body>
</html>
