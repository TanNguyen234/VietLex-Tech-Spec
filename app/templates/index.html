<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VietLex - Advanced Legal RAG Assistant</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col font-sans">
    <!-- Header -->
    <header class="border-b border-gray-900 bg-gray-950/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-amber-500 to-yellow-400 flex items-center justify-center font-bold text-gray-950 shadow-lg shadow-amber-500/20">
                    VL
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight bg-gradient-to-r from-amber-200 via-amber-400 to-yellow-200 bg-clip-text text-transparent">VIETLEX</h1>
                    <p class="text-xs text-gray-500">Advanced Legal RAG Pipeline</p>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">
                    <span class="w-1.5 h-1.5 mr-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                    Hệ thống Sẵn sàng
                </span>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="flex-1 max-w-5xl w-full mx-auto px-4 py-8 flex flex-col overflow-hidden">
        <!-- Chat Box -->
        <div class="flex-1 glass rounded-2xl flex flex-col overflow-hidden shadow-2xl relative">
            <!-- Messages history -->
            <div id="chat-history" class="flex-1 p-6 space-y-6 overflow-y-auto min-h-[400px] max-h-[600px] scrollbar-thin scrollbar-thumb-gray-800">
                <!-- Welcome Message -->
                <div class="flex items-start space-x-3 max-w-[85%]">
                    <div class="w-8 h-8 rounded-lg bg-amber-500 flex items-center justify-center font-semibold text-xs text-gray-950 flex-shrink-0">
                        AI
                    </div>
                    <div class="bg-gray-900 rounded-2xl rounded-tl-none p-4 text-sm text-gray-300 border border-gray-800">
                        Xin chào! Tôi là Trợ lý Pháp luật thông minh **VietLex**. Tôi có thể giúp gì cho bạn trong việc tra cứu Luật, Nghị định và Thông tư Việt Nam hôm nay?
                    </div>
                </div>
            </div>

            <!-- Form -->
            <div class="border-t border-gray-900 p-4 bg-gray-950/50">
                <form hx-post="/chat" 
                      hx-target="#chat-history" 
                      hx-swap="beforeend" 
                      hx-on::after-request="this.reset(); document.getElementById('chat-history').scrollTop = document.getElementById('chat-history').scrollHeight"
                      class="flex items-center space-x-3">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <input type="text" 
                           name="message" 
                           placeholder="Nhập câu hỏi pháp luật của bạn..." 
                           required 
                           class="flex-1 bg-gray-900/50 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-amber-500/50 focus:ring-1 focus:ring-amber-500/30 transition placeholder-gray-600">
                    <button type="submit" 
                            class="bg-gradient-to-tr from-amber-500 to-yellow-400 hover:from-amber-600 hover:to-yellow-500 text-gray-950 font-semibold px-6 py-3 rounded-xl text-sm transition shadow-lg shadow-amber-500/10 active:scale-95">
                        Gửi
                    </button>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-900 bg-gray-950 py-4">
        <div class="max-w-5xl mx-auto px-4 text-center text-xs text-gray-600">
            &copy; 2026 VietLex Legal RAG System. Mọi quyền được bảo lưu.
        </div>
    </footer>
</body>
</html>
